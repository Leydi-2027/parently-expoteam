<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login / Registro</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
 
 
<input type="checkbox" id="toggle">
 
<div class="container">
 
 
    <div class="left">
        <h1>Hola,<br>bienvenido.</h1>
        <p>¿No tienes una cuenta?</p>
        <label for="toggle" class="btn">Regístrate</label>
    </div>
 
 
    <div class="right">
 
       
        <form class="form login" action="#">
            <h2>Iniciar sesión <img src="img/image (1).png" class="logo-img"></h2>
 
            <input type="text" placeholder="Nombre de usuario" required>
            <input type="password" placeholder="Contraseña" required>
 
            <p class="forgot">¿Olvidaste tu contraseña?</p>
 
            <button type="submit">Iniciar sesión</button>
 
            <span>O inicia sesión con</span>
            <div class="icons">
                <a href="" class="icon red"><i class="fa-brands fa-facebook"></i></a>
                <a href="" class="icon blue"><i class="fa-brands fa-instagram"></i></a>
                <a href="" class="icon green"><i class="fa-solid fa-at"></i></a>
            </div>
        </form>
   
 
</div>
 
</body>
</html>
